<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - DevFlix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('../../assets/plano de fundo de erro.png');
            background-size: 100% 100%;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .error-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }

        .error-title {
            color: #e50914;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .error-message {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-button {
            appearance: none;
            border: 2px solid #e50914;
            background: linear-gradient(135deg, #e50914, #b20710);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.5);
            border-color: #ff6b6b;
            background: linear-gradient(135deg, #ff6b6b, #e50914);
        }

        .back-button:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(229, 9, 20, 0.3);
        }

        .back-button::before {
            content: '← ';
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-title">OPS!</h1>
        <p class="error-message">
            Esta página ainda não está disponível no DevFlix.<br>
            Estamos trabalhando para trazer o melhor conteúdo para você!
        </p>
        <a href="javascript:history.back()" class="back-button">Voltar</a>
    </div>
</body>
</html>
